<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23171e26'/%3E%3Cpath d='M4 17h6l3-8 6 14 3-6h6' fill='none' stroke='%233fb950' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<title>模型监控</title>
<style>
  :root {
    --bg: #0f1419; --card: #171e26; --border: #232d38;
    --text: #e6edf3; --muted: #8b98a5;
    --ok: #3fb950; --err: #f85149; --warn: #d29922; --skip: #4b5563;
    --accent: #1f6feb;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 64px; }
  .titlebar { display: flex; align-items: center; gap: 12px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
  .spacer { flex: 1; }

  .overview { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; min-width: 100px; }
  .stat .v { font-size: 22px; font-weight: 600; }
  .stat .l { color: var(--muted); font-size: 12px; }
  .stat.ok .v { color: var(--ok); } .stat.err .v { color: var(--err); } .stat.skip .v { color: var(--muted); }

  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .tab { background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 7px 16px; cursor: pointer; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 8px; user-select: none; transition: border-color .15s; }
  .tab:hover { border-color: #3b5266; }
  .tab.active { border-color: var(--accent); background: #14263f; }
  .tab .cnt { color: var(--muted); font-size: 12px; }
  .tab .mini { width: 8px; height: 8px; border-radius: 50%; }
  .tab .mini.ok { background: var(--ok); } .tab .mini.err { background: var(--err); } .tab .mini.na { background: var(--skip); }

  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  input[type=search], input[type=text], input[type=password] { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; outline: none; font-size: 13px; }
  input[type=search] { flex: 1; min-width: 180px; }
  input:focus { border-color: var(--accent); }
  button { background: var(--accent); border: 0; color: #fff; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; }
  button:disabled { opacity: .5; cursor: default; }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button.ghost:hover { border-color: #3b5266; }
  button.danger { background: #b62324; }

  .model { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
  .row1 { display: flex; align-items: center; gap: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .dot.ok { background: var(--ok); } .dot.error { background: var(--err); }
  .dot.timeout { background: var(--warn); } .dot.skip, .dot.none { background: var(--skip); }
  .name { font-weight: 600; word-break: break-all; }
  .apitag { font-size: 11px; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 1px 6px; flex: none; }
  .meta { margin-left: auto; color: var(--muted); font-size: 12px; white-space: nowrap; display: flex; gap: 12px; }
  .meta .lat.fast { color: var(--ok); } .meta .lat.slow { color: var(--warn); }
  .rate.good { color: var(--ok); } .rate.bad { color: var(--err); } .rate.mid { color: var(--warn); }

  .bar { display: flex; gap: 2px; margin-top: 8px; }
  .cell { flex: 1; height: 16px; max-width: 10px; border-radius: 2px; background: #2a3540; cursor: default; }
  .cell.ok { background: var(--ok); } .cell.error { background: var(--err); } .cell.timeout { background: var(--warn); }

  .errline { margin-top: 6px; color: var(--err); font-size: 12px; word-break: break-all; }
  .badge { font-size: 11px; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 1px 6px; }
  .gone { opacity: .5; }
  .empty { color: var(--muted); text-align: center; padding: 48px 0; }

  /* 弹窗 */
  .overlay { position: fixed; inset: 0; background: #0009; display: none; align-items: flex-start; justify-content: center; z-index: 20; padding: 60px 16px; overflow: auto; }
  .overlay.show { display: flex; }
  .dialog { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px; width: 100%; max-width: 520px; }
  .dialog h3 { margin: 0 0 16px; font-size: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .field input { width: 100%; }
  .dialog .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .formerr { color: var(--err); font-size: 12px; min-height: 16px; }

  /* 管理面板 */
  .admin-item { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-bottom: 1px solid var(--border); border-radius: 8px; transition: background .12s; }
  .admin-item:last-child { border-bottom: 0; }
  .admin-item .info { flex: 1; min-width: 0; }
  .admin-item .info .n { font-weight: 600; }
  .admin-item .info .u { color: var(--muted); font-size: 12px; word-break: break-all; }
  .admin-item button { padding: 5px 12px; font-size: 12px; }
  .admin-item .grip { color: var(--muted); cursor: grab; font-size: 15px; padding: 4px 6px; user-select: none; touch-action: none; }
  .admin-item .grip:active { cursor: grabbing; }
  .admin-item.dragging { opacity: .4; background: #14263f; }
  .admin-item.dropTarget { box-shadow: 0 -2px 0 0 var(--accent) inset; }
  .admin-item.dropTarget.above { box-shadow: 0 2px 0 0 var(--accent); }

  #tooltip { position: fixed; background: #000c; color: #fff; font-size: 12px; padding: 6px 10px; border-radius: 6px; pointer-events: none; display: none; max-width: 320px; z-index: 30; word-break: break-all; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #000c; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; display: none; z-index: 40; }
</style>
</head>
<body>
<div class="wrap">
  <div class="titlebar">
    <svg width="26" height="26" viewBox="0 0 32 32" style="flex:none"><rect width="32" height="32" rx="7" fill="#171e26" stroke="#232d38"/><path d="M4 17h6l3-8 6 14 3-6h6" fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <h1 id="title">模型监控</h1>
    <div class="spacer"></div>
    <button class="ghost" id="adminBtn" style="display:none" onclick="onAdminBtn()">管理</button>
    <button class="ghost" id="logoutBtn" style="display:none" onclick="logout()">退出</button>
  </div>
  <div class="sub" id="subline">加载中…</div>

  <div class="overview" id="overview"></div>

  <div class="tabs" id="tabs"></div>

  <div class="toolbar">
    <input type="search" id="filter" placeholder="搜索模型名…">
    <button id="refreshListBtn" class="ghost" style="display:none" onclick="refreshModelList()">刷新列表</button>
    <button id="probeBtn" style="display:none" onclick="triggerProbe(false)">立即探测</button>
    <button id="probeAllBtn" class="ghost" style="display:none" onclick="triggerProbe(true)">全部探测</button>
  </div>

  <div id="list"><div class="empty">加载中…</div></div>
</div>

<!-- 登录弹窗 -->
<div class="overlay" id="loginOverlay">
  <div class="dialog">
    <h3>管理员登录</h3>
    <div class="field"><label>用户名</label><input type="text" id="loginUser" autocomplete="username"></div>
    <div class="field"><label>密码</label><input type="password" id="loginPass"></div>
    <div class="formerr" id="loginErr"></div>
    <div class="actions">
      <button class="ghost" onclick="hide('loginOverlay')">取消</button>
      <button onclick="doLogin()">登录</button>
    </div>
  </div>
</div>

<!-- 管理面板：分组列表 -->
<div class="overlay" id="adminOverlay">
  <div class="dialog">
    <h3>API 管理</h3>
    <div id="adminList" style="margin-bottom:16px"></div>
    <div class="actions">
      <button class="ghost" onclick="hide('adminOverlay')">关闭</button>
      <button onclick="openEdit()">＋ 添加 API</button>
    </div>
  </div>
</div>

<!-- 添加/编辑弹窗 -->
<div class="overlay" id="editOverlay">
  <div class="dialog">
    <h3 id="formTitle">添加 API</h3>
    <div class="field"><label>名称（可选，默认取域名）</label><input type="text" id="fName" placeholder="如 Claude01"></div>
    <div class="field"><label>Base URL（不带 /v1）</label><input type="text" id="fUrl" placeholder="https://api.example.com"></div>
    <div class="field"><label>API Key <span id="keyHint"></span></label><input type="text" id="fKey" placeholder="sk-..."></div>
    <div class="formerr" id="adminErr"></div>
    <div class="actions">
      <button class="ghost" onclick="hide('editOverlay')">取消</button>
      <button id="saveBtn" onclick="saveApi()">添加</button>
    </div>
  </div>
</div>

<div id="tooltip"></div>
<div id="toast"></div>

<script>
let data = null;
let activeApi = '';
let editingName = null; // null=添加模式，否则为正在编辑的 API 名

function $(id) { return document.getElementById(id); }
function show(id) { $(id).classList.add('show'); }
function hide(id) { $(id).classList.remove('show'); }
function toast(msg) {
  const t = $('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = 'none', 2500);
}

function fmtTime(t) { return t ? new Date(t).toLocaleString() : '—'; }
function fmtAgo(t) {
  if (!t) return '—';
  const s = Math.max(0, Math.round((Date.now() - t) / 1000));
  if (s < 60) return s + ' 秒前';
  if (s < 3600) return Math.round(s / 60) + ' 分钟前';
  return Math.round(s / 3600) + ' 小时前';
}
function fmtIn(t) {
  if (!t) return '—';
  const s = Math.round((t - Date.now()) / 1000);
  if (s <= 0) return '即将开始';
  if (s < 60) return s + ' 秒后';
  return Math.round(s / 60) + ' 分钟后';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtLat(ms) { return (ms / 1000).toFixed(2) + 's'; }

function visibleModels() {
  if (!data) return [];
  return data.models.filter(m => m.present !== false || (m.history && m.history.length));
}

function apiStats(models, api) {
  const group = models.filter(m => m.api === api);
  const probed = group.filter(m => !m.excluded);
  return {
    total: group.length,
    ok: probed.filter(m => m.last && m.last.status === 'ok').length,
    err: probed.filter(m => m.last && m.last.status !== 'ok').length,
  };
}

function renderTabs() {
  const models = visibleModels();
  const apis = data.apis || [];
  const el = $('tabs');
  if (!apis.length) { el.style.display = 'none'; return; }
  el.style.display = '';

  const tab = (id, label, stats) => {
    const mini = stats == null ? '' :
      `<span class="mini ${stats.err ? 'err' : (stats.ok ? 'ok' : 'na')}"></span>`;
    const cnt = stats == null ? '' :
      `<span class="cnt">${stats.ok}/${stats.ok + stats.err}${stats.err ? ' · ' + stats.err + '异常' : ''}</span>`;
    return `<div class="tab ${activeApi === id ? 'active' : ''}" data-api="${escapeHtml(id)}">${mini}${escapeHtml(label)}${cnt}</div>`;
  };

  let html = tab('', '全部', null);
  for (const a of apis) html += tab(a, a, apiStats(models, a));
  el.innerHTML = html;

  el.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      activeApi = t.dataset.api;
      renderTabs();
      renderList();
      updateProbeButtons();
    });
  });
}

function modelCard(m, showApiTag) {
  const st = m.excluded ? 'skip' : (m.last ? m.last.status : 'none');
  const lat = m.last && m.last.status === 'ok' ? m.last.latency_ms : null;
  const latCls = lat == null ? '' : (lat < 3000 ? 'fast' : 'slow');
  const rate = m.ok_rate_24h;
  const rateCls = rate == null ? '' : rate >= 0.99 ? 'good' : rate >= 0.9 ? 'mid' : 'bad';
  const cells = (m.history || []).map(h =>
    `<div class="cell ${h.status}" data-tip="${fmtTime(h.t)} · ${h.status}${h.latency_ms ? ' · ' + fmtLat(h.latency_ms) : ''}${h.error ? ' · ' + escapeHtml(h.error) : ''}"></div>`
  ).join('');
  const lastErr = !m.excluded && m.last && m.last.status !== 'ok'
    ? `<div class="errline">${m.last.http_status ? 'HTTP ' + m.last.http_status + ' · ' : ''}${escapeHtml(m.last.error || m.last.status)}</div>` : '';
  return `<div class="model ${m.present === false ? 'gone' : ''}">
    <div class="row1">
      <div class="dot ${st}"></div>
      <div class="name">${escapeHtml(m.name)}</div>
      ${showApiTag ? `<span class="apitag">${escapeHtml(m.api)}</span>` : ''}
      ${m.excluded ? '<span class="badge">未探测</span>' : ''}
      ${m.present === false ? '<span class="badge">已下线</span>' : ''}
      <div class="meta">
        ${lat != null ? `<span class="lat ${latCls}">${fmtLat(lat)}</span>` : ''}
        ${rate != null ? `<span class="rate ${rateCls}">24h ${(rate * 100).toFixed(1)}%</span>` : ''}
      </div>
    </div>
    ${m.excluded ? '' : `<div class="bar">${cells}</div>`}
    ${lastErr}
  </div>`;
}

function renderList() {
  const models = visibleModels();
  const q = $('filter').value.trim().toLowerCase();
  const shown = models.filter(m =>
    (!q || m.name.toLowerCase().includes(q)) && (!activeApi || m.api === activeApi));

  const badRank = m => m.excluded ? 2 : (m.last && m.last.status !== 'ok' ? 0 : 1);
  shown.sort((a, b) => badRank(a) - badRank(b) || a.name.localeCompare(b.name) || a.api.localeCompare(b.api));

  const list = $('list');
  if (!shown.length) {
    list.innerHTML = `<div class="empty">${models.length ? '没有匹配的模型' : '还没有配置 API，点右上角「管理」添加'}</div>`;
    return;
  }
  const showApiTag = !activeApi && (data.apis || []).length > 1;
  list.innerHTML = shown.map(m => modelCard(m, showApiTag)).join('');
}

// 编辑/添加共用的表单联动已在下方管理函数中处理

function render() {
  if (!data) return;
  if (data.title) { $('title').textContent = data.title; document.title = data.title; }
  const models = visibleModels();
  const probed = models.filter(m => !m.excluded);
  const okN = probed.filter(m => m.last && m.last.status === 'ok').length;
  const errN = probed.filter(m => m.last && m.last.status !== 'ok').length;
  const skipN = models.length - probed.length;

  $('overview').innerHTML = `
    <div class="stat"><div class="v">${(data.apis || []).length}</div><div class="l">API 数</div></div>
    <div class="stat"><div class="v">${models.length}</div><div class="l">模型总数</div></div>
    <div class="stat ok"><div class="v">${okN}</div><div class="l">正常</div></div>
    <div class="stat err"><div class="v">${errN}</div><div class="l">异常</div></div>
    <div class="stat skip"><div class="v">${skipN}</div><div class="l">未探测</div></div>`;

  $('subline').textContent =
    `上次探测: ${fmtAgo(data.last_probe_end)} · 下次: ${data.probing ? '进行中…' : fmtIn(data.next_probe_at)} · 周期 ${data.interval_minutes} 分钟`;

  // 管理按钮
  $('adminBtn').style.display = data.admin_enabled ? '' : 'none';
  $('adminBtn').textContent = data.authed ? '管理' : '管理登录';
  $('logoutBtn').style.display = data.authed ? '' : 'none';

  renderTabs();
  renderList();
}

async function refresh() {
  try {
    const res = await fetch('/api/status');
    data = await res.json();
    if (activeApi && !(data.apis || []).includes(activeApi)) activeApi = '';
    render();
    updateProbeButtons();
  } catch (e) {
    $('subline').textContent = '无法连接监控服务：' + e.message;
  }
}

// 探测按钮：仅管理员可见；「立即探测」按当前分组/搜索词缩小范围，「全部探测」跑所有分组
function updateProbeButtons() {
  const authed = data && data.authed;
  const probeBtn = $('probeBtn'), allBtn = $('probeAllBtn'), refreshBtn = $('refreshListBtn');
  probeBtn.style.display = authed ? '' : 'none';
  allBtn.style.display = authed ? '' : 'none';
  refreshBtn.style.display = authed ? '' : 'none';
  if (!authed) return;
  probeBtn.disabled = allBtn.disabled = data.probing;
  refreshBtn.textContent = activeApi ? `刷新 ${activeApi} 列表` : '刷新全部列表';
  const q = $('filter').value.trim();
  let label = '探测当前';
  if (activeApi && q) label = `探测 ${activeApi} 匹配项`;
  else if (activeApi) label = `探测 ${activeApi}`;
  else label = '探测全部分组';
  probeBtn.textContent = data.probing ? '探测中…' : label;
  allBtn.textContent = data.probing ? '探测中…' : '全部探测';
  // 没选分组时「立即探测」等同全部，隐藏冗余按钮
  allBtn.style.display = authed && activeApi ? '' : 'none';
}

async function refreshModelList() {
  const btn = $('refreshListBtn');
  btn.disabled = true;
  const old = btn.textContent;
  btn.textContent = '刷新中…';
  try {
    const qs = activeApi ? '?api=' + encodeURIComponent(activeApi) : '';
    const res = await fetch('/api/admin/refresh-models' + qs, { method: 'POST' });
    if (res.status === 401) { toast('请先登录管理员'); show('loginOverlay'); return; }
    const body = await res.json();
    if (!res.ok) { toast(body.error || '刷新失败'); return; }
    let msg = `列表已刷新：共 ${body.total} 个模型`;
    if (body.added) msg += `，新增 ${body.added} 个（正在探测）`;
    if (body.removed) msg += `，移除 ${body.removed} 个已下线模型`;
    if (body.errors && body.errors.length) msg += `；部分失败: ${body.errors.join('; ')}`;
    toast(msg);
    await refresh();
    if (body.added) {
      let ticks = 0;
      const timer = setInterval(async () => {
        await refresh();
        if (++ticks > 20 || (data && !data.probing)) clearInterval(timer);
      }, 3000);
    }
  } catch (e) {
    toast('请求失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = old;
  }
}

async function triggerProbe(all) {
  $('probeBtn').disabled = true;
  $('probeAllBtn').disabled = true;
  let qs = '';
  if (!all && activeApi) {
    qs = '?api=' + encodeURIComponent(activeApi);
    const q = $('filter').value.trim();
    // 搜索词精确匹配到当前分组的某个模型时，只探测该模型
    if (q) {
      const inGroup = visibleModels().filter(m => m.api === activeApi && !m.excluded);
      const exact = inGroup.find(m => m.name.toLowerCase() === q.toLowerCase());
      const matched = inGroup.filter(m => m.name.toLowerCase().includes(q.toLowerCase()));
      const target = exact || (matched.length === 1 ? matched[0] : null);
      if (target) qs += '&model=' + encodeURIComponent(target.name);
    }
  }
  const res = await fetch('/api/probe' + qs, { method: 'POST' });
  if (res.status === 401) { toast('请先登录管理员'); show('loginOverlay'); }
  else if (!res.ok) { const b = await res.json().catch(() => ({})); toast(b.error || '探测请求失败'); }
  else toast(qs.includes('model=') ? '正在探测该模型…' : qs ? '正在探测该分组…' : '正在探测全部分组…');
  setTimeout(refresh, 1000);
}

// ---------- 管理 ----------

function onAdminBtn() {
  if (data && data.authed) openAdmin();
  else { $('loginErr').textContent = ''; show('loginOverlay'); ($('loginUser').value ? $('loginPass') : $('loginUser')).focus(); }
}

async function doLogin() {
  $('loginErr').textContent = '';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: $('loginUser').value, password: $('loginPass').value }),
    });
    const body = await res.json();
    if (!res.ok) { $('loginErr').textContent = body.error || '登录失败'; return; }
    hide('loginOverlay');
    $('loginPass').value = '';
    await refresh();
    openAdmin();
  } catch (e) {
    $('loginErr').textContent = '请求失败: ' + e.message;
  }
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  toast('已退出');
  refresh();
}

async function openAdmin() {
  show('adminOverlay');
  await loadAdminList();
}

let adminApiNames = []; // 管理面板当前的分组顺序

async function loadAdminList() {
  const el = $('adminList');
  try {
    const res = await fetch('/api/admin/apis');
    if (res.status === 401) { hide('adminOverlay'); show('loginOverlay'); return; }
    const body = await res.json();
    if (!body.apis.length) { adminApiNames = []; el.innerHTML = '<div class="empty" style="padding:16px 0">还没有 API</div>'; return; }
    adminApiNames = body.apis.map(a => a.name);
    el.innerHTML = body.apis.map((a, i) => `
      <div class="admin-item" data-idx="${i}" draggable="true">
        <span class="grip" title="拖动排序">⠿</span>
        <div class="info">
          <div class="n">${escapeHtml(a.name)}${a.invalid ? ' ⚠️' : ''}</div>
          <div class="u">${escapeHtml(a.base_url)} · ${escapeHtml(a.api_key_masked)}</div>
        </div>
        <button class="ghost" ${a.invalid ? 'disabled' : ''} onclick="editApi('${escapeHtml(a.name)}', '${escapeHtml(a.base_url)}')">编辑</button>
        <button class="danger" ${a.invalid ? 'disabled' : ''} onclick="delApi('${escapeHtml(a.name)}')">删除</button>
      </div>`).join('');
    bindDragSort(el);
  } catch (e) {
    el.innerHTML = `<div class="formerr">加载失败: ${escapeHtml(e.message)}</div>`;
  }
}

// 拖拽排序：拖动条目到目标位置，松手即提交新顺序
function bindDragSort(el) {
  let dragIdx = null;
  el.querySelectorAll('.admin-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragIdx = +item.dataset.idx;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', String(dragIdx)); } catch {}
    });
    item.addEventListener('dragend', () => {
      dragIdx = null;
      el.querySelectorAll('.admin-item').forEach(x => x.classList.remove('dragging', 'dropTarget', 'above'));
    });
    item.addEventListener('dragover', e => {
      if (dragIdx === null) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const overIdx = +item.dataset.idx;
      el.querySelectorAll('.admin-item').forEach(x => x.classList.remove('dropTarget', 'above'));
      if (overIdx === dragIdx) return;
      item.classList.add('dropTarget');
      if (overIdx < dragIdx) item.classList.add('above');
    });
    item.addEventListener('drop', async e => {
      e.preventDefault();
      if (dragIdx === null) return;
      const to = +item.dataset.idx;
      const from = dragIdx;
      dragIdx = null;
      if (from === to) return;
      const order = [...adminApiNames];
      const [moved] = order.splice(from, 1);
      order.splice(to, 0, moved);
      await submitOrder(order);
    });
  });
}

async function submitOrder(order) {
  const res = await fetch('/api/admin/apis/reorder', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ order }),
  });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) { toast(body.error || '排序失败'); await loadAdminList(); return; }
  await loadAdminList();
  refresh(); // 标签页与模型列表立即按新顺序显示
}

function resetForm() {
  editingName = null;
  $('formTitle').textContent = '添加 API';
  $('saveBtn').textContent = '添加';
  $('fName').value = ''; $('fUrl').value = ''; $('fKey').value = '';
  $('keyHint').textContent = '';
  $('adminErr').textContent = '';
}

// 打开添加弹窗
function openEdit() {
  resetForm();
  show('editOverlay');
  $('fName').focus();
}

// 打开编辑弹窗
function editApi(name, url) {
  editingName = name;
  $('formTitle').textContent = `编辑 API: ${name}`;
  $('saveBtn').textContent = '保存';
  $('fName').value = name;
  $('fUrl').value = url;
  $('fKey').value = '';
  $('keyHint').textContent = '（留空则不修改）';
  $('adminErr').textContent = '';
  show('editOverlay');
  $('fName').focus();
}

async function saveApi() {
  $('adminErr').textContent = '';
  const btn = $('saveBtn');
  btn.disabled = true;
  btn.textContent = editingName ? '验证中…' : '验证并添加…';
  const payload = { name: $('fName').value.trim(), base_url: $('fUrl').value.trim(), api_key: $('fKey').value.trim() };
  try {
    let res;
    if (editingName) {
      const body = { name: payload.name, base_url: payload.base_url };
      if (payload.api_key) body.api_key = payload.api_key;
      res = await fetch('/api/admin/apis/' + encodeURIComponent(editingName), {
        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
      });
    } else {
      res = await fetch('/api/admin/apis', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
      });
    }
    const body = await res.json();
    if (!res.ok) { $('adminErr').textContent = body.error || '操作失败'; return; }
    hide('editOverlay');
    toast(editingName ? '已保存，正在探测…' : `已添加（发现 ${body.model_count || '?'} 个模型），正在探测…`);
    resetForm();
    await loadAdminList();
    await refresh();
    // 探测进行中持续刷新，模型陆续出现
    let ticks = 0;
    const timer = setInterval(async () => {
      await refresh();
      if (++ticks > 20 || (data && !data.probing)) clearInterval(timer);
    }, 3000);
  } catch (e) {
    $('adminErr').textContent = '请求失败: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = editingName ? '保存' : '添加';
  }
}

async function delApi(name) {
  if (!confirm(`确定删除 API "${name}"？其监控历史也会一并删除。`)) return;
  const res = await fetch('/api/admin/apis/' + encodeURIComponent(name), { method: 'DELETE' });
  const body = await res.json();
  if (!res.ok) { toast(body.error || '删除失败'); return; }
  toast('已删除');
  await loadAdminList();
  refresh();
}

// tooltip
const tip = $('tooltip');
document.addEventListener('mouseover', e => {
  const t = e.target.closest('.cell');
  if (t && t.dataset.tip) { tip.textContent = t.dataset.tip; tip.style.display = 'block'; }
});
document.addEventListener('mousemove', e => {
  if (tip.style.display === 'block') {
    tip.style.left = Math.min(e.clientX + 12, innerWidth - 340) + 'px';
    tip.style.top = (e.clientY + 14) + 'px';
  }
});
document.addEventListener('mouseout', e => { if (e.target.closest('.cell')) tip.style.display = 'none'; });

$('filter').addEventListener('input', () => { renderList(); if (data) updateProbeButtons(); });
$('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('fKey').addEventListener('keydown', e => { if (e.key === 'Enter') saveApi(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') ['editOverlay', 'adminOverlay', 'loginOverlay'].some(id => {
    if ($(id).classList.contains('show')) { hide(id); return true; }
    return false;
  });
});
refresh();
setInterval(refresh, 30000);
setInterval(() => { if (data) render(); }, 10000);
</script>
</body>
