services:
  newapi-monitor:
    build: .
    container_name: newapi-monitor
    restart: unless-stopped
    ports:
      # 只绑定服务器本机，通过 nginx 反代或 SSH 隧道访问；
      # 若要直接公网访问改成 "8788:8788"（务必配置 admin 密码 + HTTPS）
      - "127.0.0.1:8788:8788"
    volumes:
      # 不能加 :ro —— Web 管理面板需要写回 config.json
      # （服务端已兼容单文件挂载：原子改名失败时自动退化为直接写入）
      - ./config.json:/app/config.json
      - ./data:/app/data
    environment:
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8788/api/status"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
